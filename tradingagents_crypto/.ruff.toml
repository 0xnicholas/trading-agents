[lint]
select = ["E", "F", "W", "I", "N", "UP", "B", "A", "C4", "T20", "TRY", "RUF"]
ignore = [
    "TRY003",  # raise in try block
    "B008",  # do not perform function calls in argument defaults
    "TRY200",  # try parent instead
]

[lint.isort]
force-single-line = false

[lint.per-file-ignores]
"__init__.py" = ["F401"]
"tests/*" = ["S101", "B011", "TRY002"]
